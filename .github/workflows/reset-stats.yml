name: Reset Stats (engångskörning)

on:
  workflow_dispatch:

env:
  FIREBASE_SERVICE_ACCOUNT_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

jobs:
  reset-and-regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: |
          cd scripts
          pnpm install --no-frozen-lockfile

      - name: Rensa ALLA Statistikern-poster och nollställ flaggor
        run: |
          cd scripts
          node purge-all-stats.mjs

      - name: Regenerera inlägg med Statistikern
        run: |
          cd scripts
          node statistikern.js
